name: Release & Publish Docker Image

on:
  push:
    tags:
      - "v*"  # v1.0, v1.1, v2.0.1, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RF_ROOT_URL: "https://us01.rapidfort.com"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate: run tests before releasing ──
  test:
    name: Validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest ruff bandit

      - name: Ruff lint
        run: ruff check backend/app/ --output-format=github

      - name: Backend unit tests
        run: cd backend && python -m pytest tests/ -v --ignore=tests/test_integration.py

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build base image (pre-hardening) ──
  build-base:
    name: Build Base Docker Image
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      base-tag: ${{ steps.version.outputs.base-tag }}
      image: ${{ steps.version.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "base-tag=${VERSION}-base" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Image: $IMAGE"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.base-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Harden with Rapidfort (rfstub → smoke test → rfharden) ──
  harden:
    name: Harden with Rapidfort
    runs-on: self-hosted
    needs: build-base
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ${{ needs.build-base.outputs.image }}
      BASE_TAG: ${{ needs.build-base.outputs.base-tag }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rapidfort CLI
        run: |
          curl -s https://us01.rapidfort.com/cli/ | bash
          # CLI installs into ./rapidfort relative to the workspace
          echo "${GITHUB_WORKSPACE}/rapidfort" >> $GITHUB_PATH

      - name: Login to Rapidfort
        env:
          RF_ACCESS_ID: ${{ secrets.RF_ACCESS_ID }}
          RF_SECRET_ACCESS_KEY: ${{ secrets.RF_SECRET_ACCESS_KEY }}
        run: rflogin --access-id "$RF_ACCESS_ID" --secret-access-key "$RF_SECRET_ACCESS_KEY"

      - name: Generate stub image
        run: |
          docker pull ${IMAGE}:${BASE_TAG}
          rfstub ${IMAGE}:${BASE_TAG}
          docker push ${IMAGE}:${BASE_TAG}-rfstub

      - name: Run stub container for workload profiling
        run: |
          docker run -d --name srpm-stub \
            --cap-add SYS_PTRACE \
            -p 8001:8001 \
            -e SRPM_JWT_SECRET=ci-test-secret \
            ${IMAGE}:${BASE_TAG}-rfstub

          # Wait for the app to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/api/health; then
              echo "App is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Profile: hit key endpoints to cover usage patterns
          curl -sf http://localhost:8001/api/health || true
          curl -sf http://localhost:8001/ || true

          docker stop srpm-stub
          docker rm srpm-stub

      - name: Harden image
        run: rfharden ${IMAGE}:${BASE_TAG}-rfstub

      - name: Tag hardened image as release and latest
        run: |
          VERSION=${{ needs.build-base.outputs.version }}
          HARDENED=${IMAGE}:${BASE_TAG}-rfstub-rfhardened

          docker pull $HARDENED
          docker tag $HARDENED ${IMAGE}:${VERSION}
          docker tag $HARDENED ${IMAGE}:latest
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    runs-on: self-hosted
    needs: [build-base, harden]
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-base.outputs.version }}
          name: Release ${{ needs.build-base.outputs.version }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ needs.build-base.outputs.image }}:${{ needs.build-base.outputs.version }}
            ```

            ### Quick Start

            ```bash
            docker run -d --name srpm \
              -p 8001:8001 \
              -e SRPM_JWT_SECRET=your-secret-here \
              ${{ needs.build-base.outputs.image }}:${{ needs.build-base.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          IMAGE=${{ needs.build-base.outputs.image }}
          VERSION=${{ needs.build-base.outputs.version }}
          echo "### 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Hardened**: ✅ Rapidfort CVE removal applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
