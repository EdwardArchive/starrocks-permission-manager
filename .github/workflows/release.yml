name: Release & Publish Docker Image

on:
  push:
    tags:
      - "v*"  # v1.0, v1.1, v2.0.1, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RF_ROOT_URL: "https://us01.rapidfort.com"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate: run tests before releasing ──
  test:
    name: Validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest ruff bandit

      - name: Ruff lint
        run: ruff check backend/app/ --output-format=github

      - name: Backend unit tests
        run: cd backend && python -m pytest tests/ -v --ignore=tests/test_integration.py

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build base image (pre-hardening) ──
  build-base:
    name: Build Base Docker Image
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      base-tag: ${{ steps.version.outputs.base-tag }}
      image: ${{ steps.version.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "base-tag=${VERSION}-base" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Image: $IMAGE"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.base-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Harden with Rapidfort (rfstub → smoke test → rfharden) ──
  harden:
    name: Harden with Rapidfort
    runs-on: self-hosted
    needs: build-base
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ${{ needs.build-base.outputs.image }}
      BASE_TAG: ${{ needs.build-base.outputs.base-tag }}
      RF_ACCESS_ID: ${{ secrets.RF_ACCESS_ID }}
      RF_SECRET_ACCESS_KEY: ${{ secrets.RF_SECRET_ACCESS_KEY }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rapidfort CLI (if needed)
        run: |
          # Reuse pre-installed CLI on self-hosted runner to avoid 128MB download per run
          if command -v rfstub >/dev/null 2>&1; then
            echo "Rapidfort CLI already on PATH"
          elif [ -x "/opt/rapidfort/rfstub" ]; then
            echo "Using pre-installed CLI at /opt/rapidfort"
            echo "/opt/rapidfort" >> $GITHUB_PATH
          elif [ -x "${GITHUB_WORKSPACE}/rapidfort/rfstub" ]; then
            echo "Using cached CLI in workspace"
            echo "${GITHUB_WORKSPACE}/rapidfort" >> $GITHUB_PATH
          else
            echo "Installing Rapidfort CLI"
            curl -s https://us01.rapidfort.com/cli/ | bash
            echo "${GITHUB_WORKSPACE}/rapidfort" >> $GITHUB_PATH
          fi

      - name: Install smoke test dependencies
        run: pip install httpx pytest

      - name: Generate stub image
        run: |
          docker pull ${IMAGE}:${BASE_TAG}
          rfstub ${IMAGE}:${BASE_TAG}
          docker push ${IMAGE}:${BASE_TAG}-rfstub

      - name: Run stub container and profile workload with smoke tests
        env:
          SMOKE_BASE_URL: http://localhost:18001
          SR_TEST_HOST: ${{ secrets.SR_TEST_HOST }}
          SR_TEST_PORT: ${{ secrets.SR_TEST_PORT }}
          SR_TEST_USER: ${{ secrets.SR_TEST_USER }}
          SR_TEST_PASS: ${{ secrets.SR_TEST_PASS }}
        run: |
          # Clean up any stale stub container from previous runs
          docker rm -f srpm-stub 2>/dev/null || true

          docker run -d --name srpm-stub \
            --cap-add SYS_PTRACE \
            -p 18001:8001 \
            -e SRPM_JWT_SECRET=ci-test-secret \
            ${IMAGE}:${BASE_TAG}-rfstub

          # Wait for the app to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18001/api/health; then
              echo "App is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Run smoke tests to exercise main APIs for Rapidfort profiling
          cd backend && python -m pytest tests/test_smoke_http.py -v -s || true

      - name: Stop stub container (before harden)
        run: |
          docker stop srpm-stub || true
          docker rm srpm-stub || true

      - name: Harden image
        run: rfharden ${IMAGE}:${BASE_TAG}-rfstub

      - name: Tag hardened image as release and latest
        run: |
          VERSION=${{ needs.build-base.outputs.version }}
          HARDENED=${IMAGE}:${BASE_TAG}-rfstub-rfhardened

          # Hardened image is already local (produced by rfharden); no pull needed
          docker tag $HARDENED ${IMAGE}:${VERSION}
          docker tag $HARDENED ${IMAGE}:latest
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

      - name: Cleanup (always)
        if: always()
        run: |
          # Remove stub container if still present (e.g. failed run)
          docker rm -f srpm-stub 2>/dev/null || true
          # Remove intermediate local images to save disk on self-hosted runner
          docker rmi -f ${IMAGE}:${BASE_TAG} 2>/dev/null || true
          docker rmi -f ${IMAGE}:${BASE_TAG}-rfstub 2>/dev/null || true
          docker rmi -f ${IMAGE}:${BASE_TAG}-rfstub-rfhardened 2>/dev/null || true

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    runs-on: self-hosted
    needs: [build-base, harden]
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-base.outputs.version }}
          name: Release ${{ needs.build-base.outputs.version }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ needs.build-base.outputs.image }}:${{ needs.build-base.outputs.version }}
            ```

            ### Quick Start

            ```bash
            docker run -d --name srpm \
              -p 8001:8001 \
              -e SRPM_JWT_SECRET=your-secret-here \
              ${{ needs.build-base.outputs.image }}:${{ needs.build-base.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          IMAGE=${{ needs.build-base.outputs.image }}
          VERSION=${{ needs.build-base.outputs.version }}
          echo "### 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Hardened**: ✅ Rapidfort CVE removal applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
