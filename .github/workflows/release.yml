name: Release & Publish Docker Image

on:
  push:
    tags:
      - "v*"  # v1.0, v1.1, v2.0.1, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # RF_ROOT_URL: "https://us01.rapidfort.com"  # [hardening disabled]

jobs:
  # ── Validate: run tests before releasing ──
  test:
    name: Validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest ruff bandit

      - name: Ruff lint
        run: ruff check backend/app/ --output-format=github

      - name: Backend unit tests
        run: cd backend && python -m pytest tests/ -v --ignore=tests/test_integration.py

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build & Push (Rapidfort hardening temporarily disabled — see NOTE below) ──
  #
  # NOTE: Rapidfort hardening steps (rfstub → smoke profiling → rfharden) are
  # currently commented out. Re-enable once:
  #   1. Rapidfort curated base image subscription is available, OR
  #   2. Phase 2 smoke-test coverage work lands (see issue #44) so the
  #      keep-profile can be narrowed and runtime correctness is guaranteed.
  # The commented hardening pipeline is preserved at the bottom of this job.
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.version.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Image: $IMAGE"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

