name: Release & Publish Docker Image

on:
  push:
    tags:
      - "v*"  # v1.0, v1.1, v2.0.1, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RF_ROOT_URL: "https://us01.rapidfort.com"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate: run tests before releasing ──
  test:
    name: Validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest ruff bandit

      - name: Ruff lint
        run: ruff check backend/app/ --output-format=github

      - name: Backend unit tests
        run: cd backend && python -m pytest tests/ -v --ignore=tests/test_integration.py

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build → Harden → Push (single job; intermediate images stay local) ──
  build-harden-push:
    name: Build, Harden & Push
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.version.outputs.image }}
    env:
      RF_ACCESS_ID: ${{ secrets.RF_ACCESS_ID }}
      RF_SECRET_ACCESS_KEY: ${{ secrets.RF_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "base-tag=${VERSION}-base" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Image: $IMAGE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 1. Build base image locally (no push) ──
      - name: Build base image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.base-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 2. Install / reuse Rapidfort CLI ──
      - name: Install Rapidfort CLI (if needed)
        run: |
          if command -v rfstub >/dev/null 2>&1; then
            echo "Rapidfort CLI already on PATH"
          elif [ -x "/opt/rapidfort/rfstub" ]; then
            echo "Using pre-installed CLI at /opt/rapidfort"
            echo "/opt/rapidfort" >> $GITHUB_PATH
          elif [ -x "${GITHUB_WORKSPACE}/rapidfort/rfstub" ]; then
            echo "Using cached CLI in workspace"
            echo "${GITHUB_WORKSPACE}/rapidfort" >> $GITHUB_PATH
          else
            echo "Installing Rapidfort CLI"
            curl -s https://us01.rapidfort.com/cli/ | bash
            echo "${GITHUB_WORKSPACE}/rapidfort" >> $GITHUB_PATH
          fi

      - name: Install smoke test dependencies
        run: pip install httpx pytest

      # ── 3. Generate Rapidfort stub (local) ──
      - name: Generate stub image (local)
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          BASE_TAG: ${{ steps.version.outputs.base-tag }}
        run: rfstub ${IMAGE}:${BASE_TAG}

      # ── 4. Run stub + smoke tests for workload profiling ──
      - name: Profile workload via smoke tests
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          BASE_TAG: ${{ steps.version.outputs.base-tag }}
          SMOKE_BASE_URL: http://localhost:18001
          SR_TEST_HOST_RAW: ${{ secrets.SR_TEST_HOST }}
          SR_TEST_PORT: ${{ secrets.SR_TEST_PORT }}
          SR_TEST_USER: ${{ secrets.SR_TEST_USER }}
          SR_TEST_PASS: ${{ secrets.SR_TEST_PASS }}
        run: |
          docker rm -f srpm-stub 2>/dev/null || true

          # Container uses bridge network; map localhost/127.0.0.1 to host.docker.internal
          # so the container can reach StarRocks running on the runner host.
          case "$SR_TEST_HOST_RAW" in
            localhost|127.0.0.1|0.0.0.0)
              export SR_TEST_HOST="host.docker.internal"
              echo "Translated SR_TEST_HOST → host.docker.internal"
              ;;
            *)
              export SR_TEST_HOST="$SR_TEST_HOST_RAW"
              ;;
          esac

          docker run -d --name srpm-stub \
            --cap-add SYS_PTRACE \
            --add-host host.docker.internal:host-gateway \
            -p 18001:8001 \
            -e SRPM_JWT_SECRET=ci-test-secret \
            ${IMAGE}:${BASE_TAG}-rfstub

          for i in $(seq 1 30); do
            if curl -sf http://localhost:18001/api/health; then
              echo "App is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          cd backend && python -m pytest tests/test_smoke_http.py -v -s || true

      - name: Stop stub container
        if: always()
        run: |
          docker stop srpm-stub || true
          docker rm srpm-stub || true

      # ── 5. Harden image (local) ──
      - name: Harden image
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          BASE_TAG: ${{ steps.version.outputs.base-tag }}
        shell: bash
        run: |
          set -o pipefail
          rfharden ${IMAGE}:${BASE_TAG}-rfstub 2>&1 | tee /tmp/rfharden.log

          # Verify the hardened image was actually produced
          if ! docker image inspect ${IMAGE}:${BASE_TAG}-rfhardened >/dev/null 2>&1; then
            echo "ERROR: Expected hardened image ${IMAGE}:${BASE_TAG}-rfhardened was not created"
            echo "Available images matching base tag:"
            docker images | grep -E "${BASE_TAG}" || true
            exit 1
          fi

          # Write improvement metrics to step summary
          {
            echo "### 🛡️ Rapidfort Hardening Results"
            echo ""
            echo '```'
            grep -E "Attack Surface|Package Count|Vulns Count|Hardened image|Total size|Elapsed" /tmp/rfharden.log || tail -20 /tmp/rfharden.log
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      # ── 6. Push final hardened image only ──
      - name: Tag and push final image
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          BASE_TAG: ${{ steps.version.outputs.base-tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          HARDENED=${IMAGE}:${BASE_TAG}-rfhardened
          docker tag $HARDENED ${IMAGE}:${VERSION}
          docker tag $HARDENED ${IMAGE}:latest
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

      - name: Cleanup local images (always)
        if: always()
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          BASE_TAG: ${{ steps.version.outputs.base-tag }}
        run: |
          docker rm -f srpm-stub 2>/dev/null || true
          docker rmi -f ${IMAGE}:${BASE_TAG} 2>/dev/null || true
          docker rmi -f ${IMAGE}:${BASE_TAG}-rfstub 2>/dev/null || true
          docker rmi -f ${IMAGE}:${BASE_TAG}-rfhardened 2>/dev/null || true

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    runs-on: self-hosted
    needs: build-harden-push
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-harden-push.outputs.version }}
          name: Release ${{ needs.build-harden-push.outputs.version }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ needs.build-harden-push.outputs.image }}:${{ needs.build-harden-push.outputs.version }}
            ```

            ### Quick Start

            ```bash
            docker run -d --name srpm \
              -p 8001:8001 \
              -e SRPM_JWT_SECRET=your-secret-here \
              ${{ needs.build-harden-push.outputs.image }}:${{ needs.build-harden-push.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          IMAGE=${{ needs.build-harden-push.outputs.image }}
          VERSION=${{ needs.build-harden-push.outputs.version }}
          echo "### 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Hardened**: ✅ Rapidfort CVE removal applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
