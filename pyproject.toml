[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "I",    # isort (import ordering)
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "E702",   # multiple statements on one line (existing code style)
  "B008",   # function call in default arg (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101", "S106"]

[tool.bandit]
exclude_dirs = ["backend/tests"]
skips = ["B101", "B608"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
# The CI lint job installs mypy without the project's runtime deps. For packages that
# have a known typeshed stub (e.g. cachetools), mypy emits `import-untyped`, which
# `ignore_missing_imports` does not cover. Disable it explicitly so CI matches local.
disable_error_code = ["import-untyped"]
